name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC token for npm Trusted Publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@vibexp'
          package-manager-cache: false   # never cache in release builds

      # Trusted Publishing (OIDC) requires npm >= 11.5.1
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Releasing version ${PKG_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # No NODE_AUTH_TOKEN: auth comes from the OIDC id-token (Trusted Publisher).
      # Provenance attestation is generated automatically.
      - name: Publish package
        run: npm publish

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
